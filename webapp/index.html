<!doctype html>
<html lang="ru">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover" />
    <title>IPA Store</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css" />
</head>
<body>
    <div class="app-shell">
        <header class="app-header">
            <div class="status-row">
                <span class="status-time" id="timeBadge">00:00</span>
                <button class="profile-button" type="button" aria-label="Profile">
                    <span class="profile-glow"></span>
                    <span class="profile-core">A</span>
                </button>
            </div>

            <p class="header-kicker" id="headerKicker">Featured today</p>
            <div class="header-main">
                <h1 class="screen-title" id="screenTitle">Today</h1>
                <div class="header-pill" id="headerPill">Curated</div>
            </div>
            <p class="screen-subtitle" id="screenSubtitle">Big releases, sharp apps and fast install actions.</p>
        </header>

        <section class="search-shell" id="searchShell" hidden>
            <label class="search-field" for="searchInput">
                <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M10.5 4a6.5 6.5 0 1 0 4.02 11.61l3.43 3.43 1.41-1.41-3.43-3.43A6.5 6.5 0 0 0 10.5 4Zm0 2a4.5 4.5 0 1 1-4.5 4.5A4.5 4.5 0 0 1 10.5 6Z"></path></svg>
                <input id="searchInput" type="search" placeholder="Search games, apps, developers" autocomplete="off" />
                <button class="search-clear" id="searchClear" type="button">Clear</button>
            </label>
        </section>

        <section class="filter-shell" id="filterShell" hidden>
            <div class="filter-track" id="filterTrack"></div>
        </section>

        <main class="screen-content">
            <div class="hero-rail" id="heroRail"></div>
            <div class="section-stack" id="sectionStack"></div>
            <div class="empty-state" id="emptyState" hidden>
                <strong>No matches found</strong>
                Try a different keyword or category.
            </div>
        </main>
    </div>

    <div class="sheet-scrim" id="sheetScrim" hidden></div>
    <aside class="detail-sheet" id="detailSheet" aria-hidden="true">
        <button class="sheet-close" id="sheetClose" type="button" aria-label="Close">
            <svg viewBox="0 0 24 24" aria-hidden="true"><path d="m6.4 5 5.6 5.6L17.6 5 19 6.4 13.4 12 19 17.6 17.6 19 12 13.4 6.4 19 5 17.6 10.6 12 5 6.4Z"></path></svg>
        </button>
        <div id="detailContent"></div>
    </aside>

    <nav class="bottom-bar" id="bottomBar">
        <button class="tab-button active" data-screen="today" type="button">
            <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M4 6.5A2.5 2.5 0 0 1 6.5 4h11A2.5 2.5 0 0 1 20 6.5v11A2.5 2.5 0 0 1 17.5 20h-11A2.5 2.5 0 0 1 4 17.5Zm2 0v11a.5.5 0 0 0 .5.5H12V6H6.5a.5.5 0 0 0-.5.5Zm8 11h3.5a.5.5 0 0 0 .5-.5v-5H14Zm4-7v-4a.5.5 0 0 0-.5-.5H14v4Z"></path></svg>
            <span>Today</span>
        </button>
        <button class="tab-button" data-screen="games" type="button">
            <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M7 8h10a4 4 0 0 1 3.87 5l-.76 3A3 3 0 0 1 17.2 18H6.8a3 3 0 0 1-2.91-2l-.76-3A4 4 0 0 1 7 8Zm.5 3H6v2h1.5v1.5h2V13H11v-2H9.5V9.5h-2Zm8.5 1.5a1.25 1.25 0 1 0-1.25-1.25A1.25 1.25 0 0 0 16 12.5Zm2.5 3a1.25 1.25 0 1 0-1.25-1.25A1.25 1.25 0 0 0 18.5 15.5Z"></path></svg>
            <span>Games</span>
        </button>
        <button class="tab-button" data-screen="apps" type="button">
            <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M8 4h8l1 3h2v2H5V7h2Zm-1 7h10v9H7Z"></path></svg>
            <span>Apps</span>
        </button>
        <button class="tab-button tab-button-search" data-screen="search" type="button">
            <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M10.5 4a6.5 6.5 0 1 0 4.02 11.61l3.43 3.43 1.41-1.41-3.43-3.43A6.5 6.5 0 0 0 10.5 4Zm0 2a4.5 4.5 0 1 1-4.5 4.5A4.5 4.5 0 0 1 10.5 6Z"></path></svg>
            <span>Search</span>
        </button>
    </nav>

    <script src="script.js"></script>
</body>
</html>
