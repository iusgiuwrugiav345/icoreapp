<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IPA Store</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <!-- Header with Time and Categories -->
        <header>
            <div class="time">00:00</div>
            <div class="categories">
                <button>Games</button>
                <button>Arcade</button>
                <button>Puzzle</button>
                <button>Casual</button>
                <button>Adventure</button>
            </div>
        </header>

        <!-- Now Available Section -->
        <section class="now-available">
            <div class="app-card">
                <img src="fc26-image.png" alt="EA FC 2026">
                <div class="app-details">
                    <h3>EA FC 2026</h3>
                    <p>Sport, 1.8 GB, EA SPORTS</p>
                    <button class="get-button">Get</button>
                </div>
            </div>
        </section>

        <!-- Playing For Today Section -->
        <section class="playing-today">
            <h2>Playing for today</h2>
            <div class="recommendation">
                <div class="app-card">
                    <img src="roblox-image.png" alt="Roblox">
                    <div class="app-details">
                        <h3>Roblox</h3>
                        <p>Arcade, 1.2 GB, Microsoft</p>
                        <button class="get-button">Get</button>
                    </div>
                </div>
                <div class="app-card">
                    <img src="minecraft-image.png" alt="Minecraft">
                    <div class="app-details">
                        <h3>Minecraft</h3>
                        <p>Arcade, 152 MB, Microsoft</p>
                        <button class="get-button">Get</button>
                    </div>
                </div>
                <div class="app-card">
                    <img src="map-image.png" alt="Map">
                    <div class="app-details">
                        <h3>Map</h3>
                        <p>Adventure, 15 MB, Apple</p>
                        <button class="get-button">Get</button>
                    </div>
                </div>
            </div>
        </section>

        <!-- Bottom Navigation -->
        <footer>
            <button>Apps</button>
            <button>Profile</button>
        </footer>
    </div>
    
    <script src="script.js"></script>
</body>
</html>
