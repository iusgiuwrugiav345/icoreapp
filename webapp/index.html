<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IPA Store</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- Hamburger Menu -->
    <div class="menu-icon" id="menu-toggle">&#9776;</div>

    <div class="container">
        <!-- Sidebar -->
        <nav class="sidebar" id="sidebar">
            <ul>
                <li>Главная</li>
                <li>Категории</li>
                <li>Топ</li>
                <li>Загрузки</li>
            </ul>
        </nav>

        <!-- Main Content Area -->
        <div class="main-content">
            <h1>IPA Store</h1>
            <div class="app-cards-container">
                <!-- Cards will be dynamically added here -->
                <div class="app-card">
                    <img src="minecraft-icon.png" alt="Minecraft" class="app-icon">
                    <h2>Minecraft</h2>
                    <p>iOS 12+ required</p>
                    <button>Скачать</button>
                </div>
                <div class="app-card">
                    <img src="gta-icon.png" alt="GTA San Andreas" class="app-icon">
                    <h2>GTA: San Andreas</h2>
                    <p>iOS 12+ required</p>
                    <button>Скачать</button>
                </div>
                <div class="app-card">
                    <img src="geometry-dash-icon.png" alt="Geometry Dash" class="app-icon">
                    <h2>Geometry Dash</h2>
                    <p>iOS 11+ required</p>
                    <button>Скачать</button>
                </div>
            </div>
        </div>
    </div>

    <!-- Sakura Blossoms Animation -->
    <div class="sakura"></div>

    <script src="script.js"></script>
</body>
</html>
