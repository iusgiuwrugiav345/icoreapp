<!doctype html>
<html lang="ru">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover" />
    <title>IPA Store</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css" />
</head>
<body>
    <div class="app">
        <header class="topbar">
            <div class="time" id="timeBadge">00:00</div>
            <div class="page-title">Games</div>
            <button class="avatar" type="button" aria-label="Профиль"></button>
        </header>

        <section class="chips" id="chipRow">
            <button class="chip" data-filter="arcade">Arcade</button>
            <button class="chip" data-filter="puzzle">Puzzle</button>
            <button class="chip" data-filter="casual">Casual</button>
            <button class="chip" data-filter="adventure">Advent</button>
        </section>

        <section class="now">
            <div class="section-kicker">Now available</div>
            <article class="hero-card" data-name="EA FC 2026" data-tags="sport arcade">
                <div class="hero-logo">
                    <span>EA</span>
                </div>
                <div class="hero-content">
                    <div class="hero-title">EA FC 2026</div>
                    <div class="hero-meta">Sport, 1.8 GB, EA SPORTS</div>
                </div>
                <button class="pill-btn" type="button">Get</button>
                <div class="hero-badge">FC26</div>
            </article>
        </section>

        <section class="today">
            <div class="section-title">Playing for today</div>
            <div class="section-subtitle">Our recommendation</div>

            <div class="list">
                <article class="list-card item-card" data-name="Roblox" data-tags="arcade casual">
                    <div class="list-icon roblox">R</div>
                    <div>
                        <div class="list-title">Roblox</div>
                        <div class="list-meta">Arcade, 1.2 GB, Microsoft</div>
                    </div>
                    <button class="pill-btn outline" type="button">Get</button>
                </article>

                <article class="list-card item-card" data-name="Minecraft" data-tags="arcade adventure">
                    <div class="list-icon minecraft"></div>
                    <div>
                        <div class="list-title">Minecraft</div>
                        <div class="list-meta">Arcade, 152 MB, Microsoft</div>
                    </div>
                    <button class="pill-btn outline" type="button">Get</button>
                </article>

                <article class="list-card item-card" data-name="Map" data-tags="adventure casual">
                    <div class="list-icon map"></div>
                    <div>
                        <div class="list-title">Map</div>
                        <div class="list-meta">Adventure, 15 MB, Apple</div>
                    </div>
                    <button class="pill-btn outline" type="button">Get</button>
                </article>
            </div>

            <div id="empty" class="empty" style="display: none;">
                <strong>Ничего не найдено</strong>
                Попробуй другой фильтр или название
            </div>
        </section>
    </div>

    <nav class="bottom-nav">
        <button class="nav-item active" data-nav="games">
            <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M6 17h12l1-8H5l1 8Zm2-11h8l2 3H6l2-3Z"/></svg>
            <span>Games</span>
        </button>
        <button class="nav-item" data-nav="apps">
            <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M5 5h6v6H5zM13 5h6v6h-6zM5 13h6v6H5zM13 13h6v6h-6z"/></svg>
            <span>Apps</span>
        </button>
        <button class="nav-item" data-nav="profile">
            <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M12 12a4 4 0 1 0-4-4 4 4 0 0 0 4 4Zm-7 8a7 7 0 0 1 14 0Z"/></svg>
            <span>Profile</span>
        </button>
        <button class="nav-fab" type="button" aria-label="Поиск">
            <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M11 4a7 7 0 1 0 4.28 12.55l3.08 3.08 1.41-1.41-3.08-3.08A7 7 0 0 0 11 4Zm0 2a5 5 0 1 1-5 5 5 5 0 0 1 5-5Z"/></svg>
        </button>
    </nav>

    <script src="script.js"></script>
</body>
</html>
