<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Mini App Store</title>
  <link rel="stylesheet" href="styles.css" />
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
</head>
<body>
  <div class="app">
    <header class="topbar">
      <div class="title-block">
        <div class="title">Catalog</div>
        <div id="subtitle" class="subtitle">Games • Apps</div>
      </div>
      <div class="avatar" aria-hidden="true"></div>
    </header>

    <section class="search-wrap" id="searchWrap">
      <div class="search">
        <span class="search-icon">⌕</span>
        <input id="searchInput" type="text" placeholder="Search" />
        <button id="clearSearch" class="clear" aria-label="Clear">×</button>
      </div>
      <div id="genreChips" class="chips" aria-label="Genres"></div>
    </section>

    <main class="content">
      <div class="section-head">
        <h2 id="sectionTitle">Games</h2>
        <span id="sectionCount" class="count"></span>
      </div>

      <div id="list" class="list"></div>
      <div style="text-align:center;margin-top:12px;">
        <button id="loadMoreBtn" class="get" style="padding:10px 22px;border-radius:18px;">Load more</button>
      </div>

      <section id="profilePanel" class="profile hidden">
        <div class="profile-card">
          <div class="profile-avatar"></div>
          <div class="profile-name" id="profileName">Guest</div>
          <div class="profile-id" id="profileId"></div>
        </div>
        <div class="profile-stats">
          <div class="stat">
            <div class="stat-label">Apps</div>
            <div id="statApps" class="stat-value">0</div>
          </div>
          <div class="stat">
            <div class="stat-label">Games</div>
            <div id="statGames" class="stat-value">0</div>
          </div>
          <div class="stat">
            <div class="stat-label">Genres</div>
            <div id="statGenres" class="stat-value">0</div>
          </div>
        </div>
        <div class="profile-note">Profile is pulled from Telegram WebApp.</div>
      </section>
    </main>

    <nav class="tabbar" aria-label="Navigation">
      <button class="tab active" data-tab="games">
        <span class="tab-icon">🎮</span>
        <span>Games</span>
      </button>
      <button class="tab" data-tab="apps">
        <span class="tab-icon">▦</span>
        <span>Apps</span>
      </button>
      <button class="tab" data-tab="profile">
        <span class="tab-icon">◉</span>
        <span>Profile</span>
      </button>
      <button class="tab" data-tab="search">
        <span class="tab-icon">⌕</span>
        <span>Search</span>
      </button>
    </nav>
  </div>

  <script src="app.js"></script>
</body>
</html>
